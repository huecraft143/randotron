    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

        s.textContent = await r.text();
        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

nsparent; border:1px solid var(--panel-brd,rgba(125,249,255,.28)); border-radius:var(--radius,7px); color:var(--text,#e9f1ff); font-family:var(--font-head,sans-serif); font-size:13px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:background .2s;\" style-hover=\"{{ againHover }}\">Ask again<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <div style=\"position:fixed; bottom:0; left:0; right:0; z-index:20; text-align:center; padding:12px; font-family:var(--font-data,monospace); font-size:9.5px; letter-spacing:0.1em; color:var(--muted,#8390b5); opacity:0.6; pointer-events:none;\">LIVE ENTROPY PULLED FROM PUBLIC TRUE-RANDOM SOURCES — FALLS BACK TO DEVICE CRYPTO IF UNREACHABLE<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: &quot;100%&quot; },\n  &quot;initialTheme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;universe&quot;, &quot;ocean&quot;, &quot;geothermal&quot;], &quot;default&quot;: &quot;universe&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;suspenseMs&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 1600, &quot;min&quot;: 300, &quot;max&quot;: 4000, &quot;step&quot;: 100, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;showEntropy&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    theme: this.props.initialTheme || 'universe',\n    mode: 'binary',\n    phase: 'idle',\n    question: '',\n    listText: 'Pizza\\nSushi\\nTacos\\nRamen',\n    numMin: '1',\n    numMax: '100',\n    result: null,\n    source: 'idle'\n  };\n\n  canvasRef = React.createRef();\n  streamRef = React.createRef();\n\n  THEMES = {\n    universe: {\n      '--bg0': '#04050a', '--bg1': '#0b1022',\n   '--text': '#ffe7d2', '--muted': '#a67c64', '--dim': 'rgba(255,107,26,0.1)',\n      '--font-head': \"'Saira Condensed', sans-serif\", '--font-data': \"'IBM Plex Mono', monospace\", '--font-body': \"'Barlow', sans-serif\",\n      '--radius': '4px', '--ls': '0.06em', '--tt': 'uppercase',\n      '--btn-bg': 'linear-gradient(180deg, rgba(255,107,26,0.24), rgba(255,61,61,0.12))',\n      '--btn-text': '#ffd9b3', '--btn-brd': 'rgba(255,107,26,0.55)', '--btn-shadow': '0 0 26px rgba(255,90,20,0.42)',\n      '--card-shadow': '0 24px 60px rgba(0,0,0,0.6)',\n      '--yes': '#ffd23f', '--no': '#ff4d4d'\n    }\n  };\n\n  SRC = {\n    universe: {\n      name: 'QRNG API',\n      kicker: 'CERTIFIED QUANTUM · QRNGAPI',\n      title: 'Ask the cosmos.',\n      sub: 'Your answer is drawn from quantum vacuum fluctuations — the deepest randomness physics allows. Not even the universe knows it in advance.',\n      verb: 'Observe',\n      caption: 'Collapsing the wavefunction…'\n    },\n    ocean: {\n      name: 'ATMOSPHERIC',\n      kicker: 'ATMOSPHERIC NOISE · RANDOM.ORG',\n      title: 'Ask the deep.',\n      sub: 'Decisions surface from atmospheric radio noise sampled across the planet — chaotic, unrepeatable, genuinely undecided until now.',\n      verb: 'Dive',\n      caption: 'Sounding the depths…'\n    },\n    geothermal: {\n      name: 'THERMAL ENTROPY',\n      kicker: 'THERMAL ENTROPY · CSRNG',\n      title: 'Ask the core.',\n      sub: 'Choices erupt from raw thermal entropy. No algorithm, no seed you could ever predict — only heat and chance.',\n      verb: 'Drill',\n      caption: 'Tapping the core…'\n    }\n  };\n\n  componentDidMount() {\n    const cv = this.canvasRef.current;\n    if (cv) {\n      this.ctx = cv.getContext('2d');\n      this.resize = () => {\n        const d = Math.min(2, window.devicePixelRatio || 1);\n        this.W = window.innerWidth; this.H = window.innerHeight;\n        cv.width = this.W * d; cv.height = this.H * d;\n        this.ctx.setTransform(d, 0, 0, d, 0, 0);\n      };\n      this.resize();\n      window.addEventListener('resize', this.resize);\n      this.initParticles();\n      this.t0 = performance.now();\n      const loop = (now) => { this.draw((now - this.t0) / 1000); this.raf = requestAnimationFrame(loop); };\n      this.raf = requestAnimationFrame(loop);\n    }\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this.raf);\n    if (this.resize) window.removeEventListener('resize', this.resize);\n    if (this.streamTimer) clearInterval(this.streamTimer);\n  }\n\n  componentDidUpdate(_, prev) {\n    if (prev.theme !== this.state.theme) this.initParticles();\n  }\n\n  setTheme(t) { this.setState({ theme: t, phase: 'idle', source: 'idle', result: null }); }\n  setMode(m) { this.setState({ mode: m, phase: 'idle', result: null }); }\n\n  options() { return this.state.listText.split('\\n').map(s => s.trim()).filter(Boolean); }\n\n  canDecide() {\n    const { mode, numMin, numMax } = this.state;\n    if (mode === 'list') return this.options().length >= 2;\n    if (mode === 'number') { const a = +numMin, b = +numMax; return Number.isFinite(a) && Number.isFinite(b) && b > a; }\n    return true;\n  }\n\n  bytesNeeded() { const m = this.state.mode; return m === 'number' ? 4 : (m === 'binary' ? 1 : 2); }\n  bi(bytes) { return bytes.reduce((a, b) => a * 256 + (((b % 256) + 256) % 256), 0); }\n\n  fallbackBytes(n) {\n    const a = new Uint8Array(n);\n    if (window.crypto && crypto.getRandomValues) crypto.getRandomValues(a);\n    else for (let i = 0; i < n; i++) a[i] = Math.floor(Math.random() * 256);\n    return { bytes: [...a], live: false };\n  }\n\n  async fetchBytes(theme, n) {\n    // QRNG API (qrngapi.com) — certified quantum randomness (photon/vacuum/tunneling).\n    // Falls back to device crypto if unreachable / blocked by CORS.\n    try {\n      const ctrl = new AbortController();\n      const to = setTimeout(() => ctrl.abort(), 4000);\n      const r = await fetch('https://qrngapi.com/api/random
